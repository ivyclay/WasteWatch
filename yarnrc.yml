'use client';

import { LucideIcon } from 'lucide-react';
import { Card, CardContent } from '@/components/ui/card';
import { CounterAnimation } from '@/components/counter-animation';
import { cn } from '@/lib/utils';

interface StatCardProps {
  title: string;
  value: number;
  prefix?: string;
  suffix?: string;
  icon: LucideIcon;
  description?: string;
  className?: string;
  trend?: string;
}

export function StatCard({ title, value, prefix, suffix, icon: Icon, description, className, trend }: StatCardProps) {
  return (
    <Card className={cn('relative overflow-hidden group hover:glow-emerald transition-all duration-300', className)}>
      <CardContent className="p-5">
        <div className="flex items-start justify-between">
          <div className="space-y-1">
            <p className="text-xs font-medium text-muted-foreground uppercase tracking-wider">{title ?? ''}</p>
            <p className="text-2xl font-display font-bold tracking-tight">
              <CounterAnimation end={value ?? 0} prefix={prefix} suffix={suffix} />
            </p>
            {description && (
              <p className="text-xs text-muted-foreground">{description}</p>
            )}
            {trend && (
              <p className="text-xs font-mono text-primary">{trend}</p>
            )}
          </div>
          <div className="flex h-10 w-10 items-center justify-center rounded-lg bg-primary/10">
            <Icon className="h-5 w-5 text-primary" />
          </div>
        </div>
      </CardContent>
    </Card>
  );
}
